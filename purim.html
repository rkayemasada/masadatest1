<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Department Poster</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;            /* allow content to grow if needed */
      display: grid;                 /* simpler centering */
      place-items: center;
      background-color: #f4f4f4;
    }
    .frame {
      padding: 12px;
      background: transparent;
    }
    img {
      display: block;
      max-width: 90vw;               /* fit within viewport width */
      max-height: 90vh;              /* fit within viewport height */
      height: auto;
      border: 4px solid #222;
      border-radius: 8px;
      box-shadow: 0 6px 22px rgba(0,0,0,.15);
    }
  </style>
</head>
<body>
  <div class="frame">
    <img
      src="https://rkayemasada.github.io/masadatest1/Designer.png"
      alt="If you can read this, the IT Department has already done its job."
    />
  </div>
</body>
</html>
